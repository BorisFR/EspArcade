; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;board_build.flash_mode: dio
;    '-U ARDUINO_USB_CDC_ON_BOOT'

[platformio]
default_envs = esp32-p4

[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags = 
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG'
    '-D BOARD_HAS_PSRAM'
    '-D CONFIG_SPIRAM_CACHE_WORKAROUND'
monitor_speed = 115200
monitor_port = COM5
upload_port = COM5

lib_deps = 
	tamctec/TAMC_GT911
	;https://github.com/schreibfaul1/ESP32-audioI2S.git
	;moononournation/GFX Library for Arduino
    https://github.com/moononournation/Arduino_GFX
	;bitbank2/JPEGDEC@1.2.8
    bitbank2/PNGdec

[env:esp32-p4]
platform = espressif32
;https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board =  esp32-p4-evboard
framework = arduino
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags = 
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG'
    '-D BOARD_HAS_PSRAM'
    '-D CONFIG_SPIRAM_CACHE_WORKAROUND'
    '-D CONFIG_IDF_TARGET_ESP32P4'
    '-D ARDUINO_USB_MODE'
    '-D ARDUINO_USB_CDC_ON_BOOT'
    '-I include'
monitor_speed = 115200
monitor_port = COM8
upload_port = COM8

lib_deps = 
	;tamctec/TAMC_GT911
	;https://github.com/schreibfaul1/ESP32-audioI2S.git
	;moononournation/GFX Library for Arduino
    https://github.com/moononournation/Arduino_GFX
	;bitbank2/JPEGDEC@1.2.8
    bitbank2/PNGdec